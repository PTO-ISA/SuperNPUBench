site_name: SuperNPUBench C++ Programming Manual
site_description: C++ programming, tile intrinsic, and kernel manual for a superscalar NPU
site_url: https://pto-isa.github.io/SuperNPUBench/
repo_url: https://github.com/PTO-ISA/SuperNPUBench
repo_name: PTO-ISA/SuperNPUBench
edit_uri: edit/main/docs/
copyright: SuperNPUBench contributors

theme:
  name: material
  custom_dir: docs/overrides
  language: en
  icon:
    logo: material/chip
    repo: fontawesome/brands/github
    annotation: material/arrow-right-circle
  features:
    - announce.dismiss
    - content.action.edit
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Use dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Use light mode

