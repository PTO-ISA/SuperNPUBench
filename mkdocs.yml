plugins:
  - privacy:
      assets_include:
        - unpkg.com/mermaid@10.9.4/dist/mermaid.min.js
      links: false
  - search:
      separator: '[\\s\\-\\.\\_]+'

not_in_nav: |
  tutorials/migrated-pto-kernels.md

exclude_docs: |
  overrides/**

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.snippets:
      base_path:
        - .
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - assets/stylesheets/supernpu.css

extra_javascript:
  - assets/javascripts/supernpu.js
  - https://unpkg.com/mathjax@3.2.2/es5/tex-mml-chtml.js

extra:
  status:
    verified: Compiled
    source: Source-backed
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/PTO-ISA/SuperNPUBench
      name: SuperNPUBench on GitHub

strict: true
